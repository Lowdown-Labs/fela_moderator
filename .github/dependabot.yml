version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-minor-patch:
        dependency-type: development
        update-types: [minor, patch]
    ignore:
      # Majors pin intentionally (vitest 2, react 18, typescript 5, etc.) — bump these by hand, not via bot.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
