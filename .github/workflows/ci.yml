name: ci

# Test (cross-platform matrix) + lint/format + typecheck + package checks + coverage + security.
# Least-privilege by default: no token scopes unless a job opts in.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test:
    name: test (node ${{ matrix.node }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: ["18", "20", "22"]
        include:
          # byte↔UTF-16 span logic is string-encoding sensitive — prove it on macOS + Windows too
          - os: macos-latest
            node: "20"
          - os: windows-latest
            node: "20"
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm install --no-audit --no-fund
      - run: npm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm run format:check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck

  package:
    name: package (publint · size · types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - run: npm run check:package
      - run: npm run size
      - name: types resolution (informational)
        run: npm run check:types-pkg
        continue-on-error: true

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - run: npm run coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - name: npm audit (prod deps, high+)
        run: npm audit --omit=dev --audit-level=high
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Semgrep OSS (free rulesets, no account)
        run: |
          pip install semgrep
          semgrep scan --error --config p/javascript --config p/security-audit --config p/secrets

  deps:
    name: dependency-review (license allowlist)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          # Enforce the SDK's MIT/permissive-only charter on every new dependency.
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, CC-BY-4.0, 0BSD, Unlicense, BlueOak-1.0.0, Python-2.0
