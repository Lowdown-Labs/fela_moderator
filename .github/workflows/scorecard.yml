name: scorecard

# OpenSSF Scorecard — automated supply-chain / security posture score + badge.
# Runs weekly and on push to main; publishes results to the code-scanning dashboard.
on:
  branch_protection_rule:
  schedule:
    - cron: "27 4 * * 1" # Mondays 04:27 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code scanning
      id-token: write # publish results for the badge
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@v2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: actions/upload-artifact@v7
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
      # Generic SARIF uploader (lives in the codeql-action repo but runs NO CodeQL analysis — it only
      # posts Scorecard's results to the code-scanning tab). Consistent with the "Semgrep OSS, no CodeQL" charter.
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
